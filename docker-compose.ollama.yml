services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ${CONTAINER_NAME_OLLAMA:-ollama}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${VOLUME_OLLAMA:-ollama-data}:/root/.ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
      # Optional: Uncomment to limit resources
      # - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      # - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    networks:
      - ${NETWORK_NAME:-shared_network}
    restart: ${RESTART_POLICY:-unless-stopped}
    # Uncomment for NVIDIA GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:
    driver: local

networks:
  shared_network:
    name: ${NETWORK_NAME:-shared_network}
    external: ${NETWORK_EXTERNAL:-true}
