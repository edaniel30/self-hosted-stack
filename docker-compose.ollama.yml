version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      # Puerto para API REST de Ollama
      - "11434:11434"
    volumes:
      # Persistencia de modelos y configuración
      - ollama-data:/root/.ollama
    environment:
      # Permite conexiones desde cualquier host (necesario para acceso externo)
      - OLLAMA_HOST=0.0.0.0
      # Opcional: Limitar o expandir recursos
      # - OLLAMA_NUM_PARALLEL=1
      # - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    # Descomentar si tienes GPU NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:
    driver: local
